<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#23272C">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦺</text></svg>">
<title>百日安全</title>
<style>
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
button,.opt,summary{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F4F3EE; --card:#FFFFFF; --ink:#23272C; --muted:#75716A; --line:#E3E0D8;
  --accent:#F5B301; --accent-ink:#231F10; --plate:#23272C; --plate-ink:#F4F3EE;
  --good:#2E7D46; --good-bg:#E8F3EC; --bad:#C0442E; --bad-bg:#F9ECE9;
  --sel:#FBF3DA; --sel-line:#E0B93F;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#15171A; --card:#1E2126; --ink:#E9E7E1; --muted:#9A968D; --line:#33373D;
  --accent:#E9B123; --accent-ink:#231F10; --plate:#101214; --plate-ink:#E9E7E1;
  --good:#5CB878; --good-bg:#1E2E24; --bad:#E07B62; --bad-bg:#33211C;
  --sel:#33301F; --sel-line:#8A7524;
}}
:root[data-theme="light"]{
  --bg:#F4F3EE; --card:#FFFFFF; --ink:#23272C; --muted:#75716A; --line:#E3E0D8;
  --accent:#F5B301; --accent-ink:#231F10; --plate:#23272C; --plate-ink:#F4F3EE;
  --good:#2E7D46; --good-bg:#E8F3EC; --bad:#C0442E; --bad-bg:#F9ECE9;
  --sel:#FBF3DA; --sel-line:#E0B93F;
}
:root[data-theme="dark"]{
  --bg:#15171A; --card:#1E2126; --ink:#E9E7E1; --muted:#9A968D; --line:#33373D;
  --accent:#E9B123; --accent-ink:#231F10; --plate:#101214; --plate-ink:#E9E7E1;
  --good:#5CB878; --good-bg:#1E2E24; --bad:#E07B62; --bad-bg:#33211C;
  --sel:#33301F; --sel-line:#8A7524;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:16px;line-height:1.6}
.stripe{height:8px;background:repeating-linear-gradient(-45deg,var(--accent) 0 12px,var(--plate) 12px 24px)}
header{background:var(--plate);color:var(--plate-ink)}
.hd-in{max-width:640px;margin:0 auto;padding:18px 20px 16px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
h1{margin:0;font-size:26px;letter-spacing:.14em}
.dates{font-size:13px;opacity:.7;font-variant-numeric:tabular-nums}
main{max-width:640px;margin:0 auto;padding:14px 12px 60px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
details.card{padding:0}
details.card>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:10px;
  padding:14px 16px;font-size:16px;font-weight:700}
details.card>summary::-webkit-details-marker{display:none}
details.card>summary::before{content:"▸";color:var(--muted);font-size:14px;transition:transform .15s}
details.card[open]>summary::before{transform:rotate(90deg)}
details.card>.body{padding:2px 16px 16px;border-top:1px solid var(--line)}
.chip{margin-left:auto;font-size:12.5px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
.chip.todo{background:var(--sel);color:var(--ink);border:1px solid var(--sel-line)}
.chip.ok{background:var(--good-bg);color:var(--good)}
.chip.no{background:var(--bad-bg);color:var(--bad)}
.chip.mute{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
.big{font-size:24px;font-weight:800;margin:0}
.big .sub{font-size:14px;font-weight:400}
.sub{color:var(--muted);font-size:14px}
.theme-tag{display:inline-block;background:var(--accent);color:var(--accent-ink);
  font-size:13px;font-weight:700;padding:2px 10px;border-radius:4px;margin-top:8px}
.bar{height:7px;background:var(--line);border-radius:4px;margin:10px 0 2px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent)}
.tasks{margin:12px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.tasks li{display:flex;gap:9px;align-items:baseline;font-size:15px}
.tasks .st{margin-left:auto;font-size:13px;font-weight:700;white-space:nowrap}
.tasks .st.ok{color:var(--good)} .tasks .st.todo{color:var(--muted)}
.tasks .dot{color:var(--accent);font-weight:800}
button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:12px 16px;font-weight:700}
.btn-main{background:var(--accent);color:var(--accent-ink);width:100%;font-size:16px;margin-top:12px}
.btn-ghost{background:none;border:1.5px solid var(--line);color:var(--ink);width:100%;margin-top:10px}
.btn-main:active,.btn-ghost:active{transform:translateY(1px)}
.namebox{display:flex;gap:8px;margin-top:12px}
.namebox input,.namebox select{flex:1;font:inherit;padding:10px 12px;border:1.5px solid var(--line);
  border-radius:8px;background:var(--bg);color:var(--ink);min-width:0}
.q{border-top:1px solid var(--line);padding:14px 0 4px}
.q:first-child{border-top:none;padding-top:8px}
.q-head{font-size:13px;color:var(--muted);margin-bottom:4px}
.q-head b{color:var(--accent-ink);background:var(--accent);border-radius:3px;padding:0 6px;margin-right:6px;font-size:12px}
.q-stem{font-weight:600;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.opt{border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;cursor:pointer;font-size:15px;
  background:var(--card);color:var(--ink);text-align:left;font-weight:400;display:flex;gap:8px}
.opt .k{font-weight:700;min-width:1.2em}
.opt.on{background:var(--sel);border-color:var(--sel-line)}
.opt.hit{background:var(--good-bg);border-color:var(--good)}
.opt.miss{background:var(--bad-bg);border-color:var(--bad)}
.verdict{font-size:14px;font-weight:700;margin:0 0 8px}
.verdict.ok{color:var(--good)} .verdict.no{color:var(--bad)}
.score-line{font-size:22px;font-weight:800;margin:10px 0 0}
.copybox{background:var(--bg);border:1px dashed var(--line);border-radius:8px;padding:10px 12px;
  font-size:14px;margin-top:12px;word-break:break-all}
.wk{border-top:1px solid var(--line)}
.wk:first-of-type{border-top:none}
.wk summary{cursor:pointer;padding:9px 0;font-weight:600;font-size:14.5px;list-style:none;display:flex;gap:8px;align-items:baseline}
.wk summary::-webkit-details-marker{display:none}
.wk summary::before{content:"▸";color:var(--muted);font-size:12px;transition:transform .15s}
.wk[open] summary::before{transform:rotate(90deg)}
.wk summary .wno{white-space:nowrap;flex-shrink:0}
.wk summary .rng{color:var(--muted);font-weight:400;font-size:12.5px;font-variant-numeric:tabular-nums}
.drow{display:flex;gap:9px;padding:4px 0 4px 20px;font-size:13.5px;font-variant-numeric:tabular-nums;flex-wrap:wrap}
.drow.rest{color:var(--muted)}
.drow .dn{min-width:4.2em;color:var(--muted)}
.drow .dd{min-width:6em}
.drow.today-row{background:var(--sel);border-radius:6px}
.drow .done{color:var(--good);font-weight:700;margin-left:auto}
.sq{border-top:1px solid var(--line)}
.sq:first-of-type{border-top:none}
.sq summary{cursor:pointer;padding:9px 0;font-size:14.5px;font-weight:600;list-style:none}
.sq .ans{color:var(--muted);font-size:14px;padding:0 0 10px}
.wrong-item{border-top:1px solid var(--line);padding:10px 0;font-size:14.5px}
.wrong-item:first-child{border-top:none}
.wrong-item .wa{color:var(--good);font-weight:700;font-size:13.5px}
.note{font-size:13px;color:var(--muted);margin-top:10px}
a{color:inherit}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
button:focus-visible,.opt:focus-visible,summary:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}
@media (max-width:390px){
  h1{font-size:22px}
  .big{font-size:21px}
  main{padding:12px 8px 50px}
  .card{padding:14px}
  details.card>summary{padding:13px 14px}
  details.card>.body{padding:2px 14px 14px}
}
</style>
</head>

<header>

  <div class="hd-in"><h1>百日安全</h1><div class="dates">2026.07.20 — 10.27 · 100 天</div></div>

  <details class="card" id="wrCard">
    <summary>错题<span class="chip" id="wrChip"></span></summary>
    <div class="body" id="wrBody"></div>
  </details>
  <details class="card" id="sqCard">
    <summary>本周简答 · 班前会提问用</summary>
    <div class="body" id="sqBody"></div>
  </details>
  <details class="card" id="scCard">
    <summary>逐日安排</summary>
    <div class="body"><div id="schedList"></div></div>
  </details>
</main>

  "10-03":"国庆","10-04":"国庆","10-05":"国庆","10-06":"国庆","10-07":"国庆"};
const MAKEUP = new Set(["09-20","10-10"]);   // 国庆调休上班日(国办发明电〔2025〕7号)
const MONTH_EXAMS = new Set(["08-31","09-30","10-16"]);  // 线下月考:每月最后一个工作日,末次提前至第13周(10/16),仅标注不在线上考
const WD = ["周日","周一","周二","周三","周四","周五","周六"];

function fmt(d){ return String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dateOfDay(n){ const d = new Date(START); d.setDate(d.getDate()+n-1); return d; }
function themeName(w){
  if (w===14) return "第三阶段 · 总结评优";      // 末次统考后不再安排每日答题
  if (w===15) return "第三阶段 · 收官";
  const cs = WEEK_CAT[w]; if (!cs) return "综合练习";
  return (w>=11?"复习:":"") + cs.map(c=>BANK.cats[String(c)]).join("、"); }

// ---- 生成100天日程 ----
const SCHED = [];
for (let n=1; n<=TOTAL; n++){
  const d = dateOfDay(n), week = Math.floor((n-1)/7)+1, key = fmt(d);
  const rest = !!HOLIDAYS[key] || ((d.getDay()===0 || d.getDay()===6) && !MAKEUP.has(key));
  SCHED.push({n, d, week, key, rest, restwhy: HOLIDAYS[key] || "周末"});
}
// 警示视频:第1—13周每周1部(方案逐周安排),第14—15周总结评优不安排
// 周五撞法定假日的三周,方案已写明具体日期:

const VIDEO_OF = {};
for (let w=1; w<=13; w++){
  const fri = SCHED.find(r=>r.week===w && r.d.getDay()===5);   // 方案:每周五班组例会集中观看
  const key = VIDEO_DAY_FIX[w] || (fri ? fri.key : null);
  if (key) VIDEO_OF[w] = key;
}
// 末次统考(10/16)结束后转入第三阶段:总结评优,不再安排每日答题与视频
const FINAL_EXAM = "10-16";
const WRAPUP_ACT = {14:"总结评优 · 统计积分成绩、评选表彰", 15:"收官 · 总结大会、固化制度"};
SCHED.forEach(r=>{
  r.wrapup = r.n > SCHED.find(x=>x.key===FINAL_EXAM).n;
  if (r.rest){
    r.act = "休 · "+r.restwhy
          + (VIDEO_OF[r.week]===r.key ? ` · 看视频《${VIDEO_TITLES[r.week]}》` : "");
    return;
  }
  if (r.wrapup){
    r.act = (WRAPUP_ACT[r.week] || "总结评优") + " · 不排每日答题";
    return;
  }
  const p = [];
  if (VIDEO_OF[r.week]===r.key) p.push(`看视频《${VIDEO_TITLES[r.week]}》`);
  p.push("答题5题");
  if (MONTH_EXAMS.has(r.key)) p.push("线下月考");
  if (r.d.getDay()===5) p.push("讨论问答");
  r.act = p.join(" + ") + (MAKEUP.has(r.key) ? "(调休上班)" : "");
});

const MEM = {};

  get name(){ return MEM.name || ""; },
  set name(v){ MEM.name = v; },
  get(k){ return (k in MEM) ? MEM[k] : null; },
  set(k,v){ MEM[k] = v; }
};
function weekWrongs(w){ return store.get("w:"+w) || []; }
function addWrongs(w, ids){
  const s = new Set(weekWrongs(w)); ids.forEach(i=>s.add(i)); store.set("w:"+w, Array.from(s));

function delWrongs(w, ids){

// ---- 抽题 ----
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t = Math.imul(a^a>>>15, 1|a); t = t+Math.imul(t^t>>>7, 61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function hash(s){ let h=2166136261; for(const c of s){ h^=c.charCodeAt(0); h=Math.imul(h,16777619); } return h>>>0; }
function shuffled(arr, rnd){ const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function learnedCats(week){   // 截至某周已学过的分类
  const s = new Set();
  for (let w=1; w<=Math.min(week,15); w++) (WEEK_CAT[w]||[]).forEach(c=>s.add(c));
  return Array.from(s);
}
function themedPick(seed, week, count, cap){
  // cap:本周新题最多抽几道(不传=不限,尽量用满本周题);其余优先从"以前已学过的分类"补,不够再从未学内容兜底
  const rnd = mulberry32(hash(seed));
  const cs = WEEK_CAT[week];
  if (!cs) return shuffled(BANK.questions, rnd).slice(0, count);
  const learned = learnedCats(week);   // 含本周
  const poolAll = shuffled(BANK.questions.filter(q=>cs.includes(q.cat)), rnd);
  const extra   = shuffled(BANK.questions.filter(q=>learned.includes(q.cat) && !cs.includes(q.cat)), rnd);
  const rest    = shuffled(BANK.questions.filter(q=>!learned.includes(q.cat)), rnd);
  const poolNow  = cap ? poolAll.slice(0, cap) : poolAll;
  const poolLeft = cap ? poolAll.slice(cap) : [];
  return poolNow.concat(extra).concat(poolLeft).concat(rest).slice(0, count);
}

// ---- 通用答题引擎 ----
const QZ = {};   // 容器id -> 状态
function ensureName(boxId){
  const el = document.getElementById(boxId);
  const nm = (el ? el.value : store.name).trim();
  if (!nm){ if(el){ el.focus(); el.placeholder="请先填姓名"; } return null; }
  store.name = nm; return nm;
}
function nameBoxHtml(id){
  if (NAMES.length){
    const opts = NAMES.map(x=>`<option${x===store.name?" selected":""}>${x}</option>`).join("");
    return `<div class="namebox"><select id="${id}">${opts}</select></div>`;
  }
  return `<div class="namebox"><input id="${id}" placeholder="你的姓名" value="${store.name}"></div>`;
}
function qStart(cid, qs, meta){
  QZ[cid] = { qs, meta, sel: qs.map(q => q.type==="多选" ? new Set() : null), done:false };
  qRender(cid);
}
function qRender(cid){
  const st = QZ[cid];
  let h = "";
  st.qs.forEach((q,i)=>{
    h += `<div class="q"><div class="q-head"><b>${q.type}</b>第 ${i+1} / ${st.qs.length} 题${q.type==="多选"?" · 可选多项":""}</div>`;
    h += `<div class="q-stem">${q.q}</div><div class="opts">`;
    const rows = q.type==="判断" ? [{k:"√",t:"正确"},{k:"×",t:"错误"}] : q.opts;
    rows.forEach(o=>{
      const on = q.type==="多选" ? st.sel[i].has(o.k) : st.sel[i]===o.k;
      h += `<button class="opt${on?" on":""}" onclick="qPick('${cid}',${i},'${o.k}')"><span class="k">${o.k}</span><span>${o.t}</span></button>`;
    });
    h += `</div></div>`;
  });
  h += `<button class="btn-main" onclick="qSubmit('${cid}')">交卷</button>`;
  document.getElementById(cid).innerHTML = h;
}
function qPick(cid,i,k){
  const st = QZ[cid], q = st.qs[i];
  if (st.done) return;
  if (q.type==="多选"){ st.sel[i].has(k) ? st.sel[i].delete(k) : st.sel[i].add(k); }
  else st.sel[i] = k;
  qRender(cid);
}
function qAns(st,i){ const s = st.sel[i];
  return st.qs[i].type==="多选" ? Array.from(s).sort().join("") : (s||""); }
function qSubmit(cid){
  const st = QZ[cid];
  for (let i=0;i<st.qs.length;i++){
    if (!qAns(st,i)){ alert("第 "+(i+1)+" 题还没作答"); return; }
  }
  st.done = true;
  let c = 0; const wrongIds = [];
  const marks = st.qs.map((q,i)=>{ const ok = qAns(st,i)===q.ans; ok ? c++ : wrongIds.push(q.id); return ok; });
  st.meta.onDone && st.meta.onDone(c, wrongIds);
  const score = Math.round(c*100/st.qs.length), pass = score>=st.meta.passScore;
  const passTxt = st.meta.passScore<=100 ? ` · ${pass?"合格":"未合格"}` : "";   // 重练错题不谈合格
  let h = `<div class="score-line">${score} 分 <span class="sub" style="font-size:15px;font-weight:400">${c}/${st.qs.length} 题${passTxt}</span></div>`;
  st.qs.forEach((q,i)=>{
    h += `<div class="q"><div class="q-head"><b>${q.type}</b>第 ${i+1} 题</div><div class="q-stem">${q.q}</div>`;
    h += `<div class="verdict ${marks[i]?"ok":"no"}">${marks[i]?"✓ 答对":"✗ 答错"} · 你的答案 ${qAns(st,i)} · 正确答案 ${q.ans}</div><div class="opts">`;
    const rows = q.type==="判断" ? [{k:"√",t:"正确"},{k:"×",t:"错误"}] : q.opts;
    rows.forEach(o=>{
      const hit = q.ans.includes(o.k), chose = qAns(st,i).includes(o.k);
      h += `<div class="opt${hit?" hit":(chose?" miss":"")}"><span class="k">${o.k}</span><span>${o.t}${hit?" ✓":""}</span></div>`;
    });
    h += `</div></div>`;
  });
  if (st.meta.copyText){
    const txt = st.meta.copyText(c, score, pass);
    h += `<div class="copybox" id="ct-${cid}">${txt}</div>`;
    h += `<button class="btn-main" onclick="copyText('ct-${cid}')">复制成绩</button>`;
  }
  document.getElementById(cid).innerHTML = h;
  refreshAll();
}
function copyText(id){
  const t = document.getElementById(id).textContent;
  (navigator.clipboard ? navigator.clipboard.writeText(t) : Promise.reject()).then(
    ()=>alert("已复制"),
    ()=>{ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove(); alert("已复制"); });
}

function drawFor(sec){                      // 当天该段抽中谁(按日期抽签)

const TYPE_ORD = {"单选":0,"多选":1,"判断":2,"简答":3};
const DRILL_ALL = BANK.questions.slice();
Object.keys(BANK.shortqs||{}).forEach(c=>{ (BANK.shortqs[c]||[]).forEach((s,i)=>{
  DRILL_ALL.push({type:"简答", cat:+c, q:s.q, a:s.a, id:"简答-"+c+"-"+(i+1)}); }); });
DRILL_ALL.sort((a,b)=> TYPE_ORD[a.type]-TYPE_ORD[b.type] || a.cat-b.cat ||
  String(a.num||a.id).localeCompare(String(b.num||b.id)));
const DRMAP = {}; DRILL_ALL.forEach(q=>DRMAP[q.id]=q);
const DR_KEY = "bra-drill-v1";
const CAN_SAVE = (()=>{ try{ localStorage.setItem("_bra_t","1"); localStorage.removeItem("_bra_t");
  return true; }catch(e){ return false; } })();
function drSt(){
  if (!MEM._drill){
    let v = null;
    if (CAN_SAVE) try{ v = JSON.parse(localStorage.getItem(DR_KEY)); }catch(e){}
    MEM._drill = (v && v.right) ? v : {right:{}, wrong:{}, pos:{}, f:{type:""}};
    if (!MEM._drill.f) MEM._drill.f = {type:""};
  }
  return MEM._drill;
}
function drSave(){ if (CAN_SAVE) try{ localStorage.setItem(DR_KEY, JSON.stringify(MEM._drill)); }catch(e){} }
function drKeyOf(){ return drSt().f.type || "全部"; }
function drPool(){
  const f = drSt().f;
  return DRILL_ALL.filter(q => !f.type || q.type===f.type);
}
function drFilter(){
  drSt().f = { type: document.getElementById("drType").value };
  drSave(); renderDrill(true);
}
function renderDrill(force){
  const st = drSt();
  const chip = document.getElementById("drChip");
  const done = DRILL_ALL.filter(q=>st.right[q.id]||st.wrong[q.id]).length;
  chip.textContent = done ? done+"/"+DRILL_ALL.length : DRILL_ALL.length+" 题";
  chip.className = "chip "+(done>=DRILL_ALL.length ? "ok" : "mute");
  if (MEM._drun && !force) return;   // 刷题中不重绘
  if (force) MEM._drun = null;
  const pool = drPool();
  const seen = pool.filter(q=>st.right[q.id]||st.wrong[q.id]).length;
  const redo = DRILL_ALL.filter(q=>st.wrong[q.id]).length;
  const pos = Math.min(st.pos[drKeyOf()]||0, pool.length);
  const tyOpts = `<option value="">全部题型 · ${DRILL_ALL.length} 题</option>` +
    ["单选","多选","判断","简答"].map(t=>{
      const n = DRILL_ALL.filter(q=>q.type===t).length;
      return `<option value="${t}"${st.f.type===t?" selected":""}>${t} · ${n} 题</option>`;
    }).join("");
  let h = `<p class="sub" style="margin:10px 0 0">全部 ${DRILL_ALL.length} 道题按组刷,每组 10 题、即时判分,百日刷成钢。进度${CAN_SAVE?"存在本机,随时接着刷":"仅本次打开有效"}。</p>`;
  h += `<div class="namebox"><select id="drType" onchange="drFilter()">${tyOpts}</select></div>`;
  h += `<div class="bar"><i style="width:${pool.length?Math.round(seen*100/pool.length):0}%"></i></div>`;
  h += `<div class="sub">当前范围 ${pool.length} 题 · 已刷 ${seen} 题${redo?` · 待回炉 ${redo} 题`:""}</div>`;
  h += `<button class="btn-main" onclick="drStart('seq')">${pos>0&&pos<pool.length?`继续刷题 · 从第 ${pos+1} 题起`:(seen>=pool.length&&pool.length?"再刷一遍":"开始刷题")}</button>`;
  if (redo) h += `<button class="btn-ghost" onclick="drStart('redo')">错题回炉(${Math.min(redo,10)} 题)</button>`;
  if (done) h += `<p class="note"><a href="#" onclick="drReset();return false">清空刷题记录,从头再来</a></p>`;
  document.getElementById("drBody").innerHTML = h;
}
function drStart(mode){
  const st = drSt();
  let list, base = 0, poolLen = 0;
  if (mode==="redo"){
    list = shuffled(DRILL_ALL.filter(q=>st.wrong[q.id]), Math.random).slice(0,10);
  } else {
    const pool = drPool();
    poolLen = pool.length;
    base = st.pos[drKeyOf()]||0;
    if (base>=poolLen) base = 0;
    list = pool.slice(base, base+10);
  }
  if (!list.length) return;
  MEM._drun = { mode, list, base, poolLen,
    qs: list.map(()=>({ sel:new Set(), mine:null, ok:false, reveal:false })), wrongThis: [] };
  drRender();
}
function drQHtml(q, i){
  const s = MEM._drun.qs[i];
  let h = `<div class="q"><div class="q-head"><b>${q.type}</b>第 ${i+1} 题 · ${BANK.cats[String(q.cat)]}${q.type==="多选"&&s.mine===null?" · 可选多项":""}</div>`;
  h += `<div class="q-stem">${q.q}</div>`;
  if (q.type==="简答"){
    if (s.mine===null && !s.reveal){
      h += `<button class="btn-ghost" style="margin-top:0" onclick="drReveal(${i})">看参考答案</button>`;
    } else {
      h += `<div class="copybox" style="margin-top:0">参考答案:${q.a}</div>`;
      if (s.mine===null){
        h += `<div class="opts" style="margin-top:8px">`;
        h += `<button class="opt" onclick="drMark(${i},true)"><span class="k">✓</span><span>能说出要点,过</span></button>`;
        h += `<button class="opt" onclick="drMark(${i},false)"><span class="k">✗</span><span>还不熟,记入回炉</span></button></div>`;
      } else {
        h += `<div class="verdict ${s.ok?"ok":"no"}" style="margin-top:8px">${s.ok?"✓ 已过":"✗ 已记入回炉"}</div>`;
      }
    }
  } else {
    h += `<div class="opts">`;
    const rows = q.type==="判断" ? [{k:"√",t:"正确"},{k:"×",t:"错误"}] : q.opts;
    rows.forEach(o=>{
      if (s.mine!==null){
        const hit = q.ans.includes(o.k), chose = s.mine.includes(o.k);
        h += `<div class="opt${hit?" hit":(chose?" miss":"")}"><span class="k">${o.k}</span><span>${o.t}${hit?" ✓":""}</span></div>`;
      } else {
        h += `<button class="opt${s.sel.has(o.k)?" on":""}" onclick="drPick(${i},'${o.k}')"><span class="k">${o.k}</span><span>${o.t}</span></button>`;
      }
    });
    h += `</div>`;
    if (s.mine!==null)
      h += `<div class="verdict ${s.ok?"ok":"no"}">${s.ok?"✓ 答对":"✗ 答错"} · 你的答案 ${s.mine} · 正确答案 ${q.ans}</div>`;
    else if (q.type==="多选" && s.sel.size)
      h += `<button class="btn-main" style="margin-top:0" onclick="drJudge(${i})">确定</button>`;
  }
  return h + `</div>`;
}
function drRender(){
  const run = MEM._drun;
  const doneN = run.qs.filter(s=>s.mine!==null).length;
  const okN = run.qs.filter(s=>s.ok).length;
  const head = run.mode==="redo" ? `错题回炉 · 共 ${run.list.length} 题`
    : `第 ${run.base+1}–${run.base+run.list.length} 题 / 共 ${run.poolLen} 题`;
  let h = `<div class="q-head" style="margin-top:12px">${head}${doneN?` · 已答 ${doneN}/${run.list.length} · 对 ${okN}`:""}</div>`;
  h += `<div class="bar" style="margin:6px 0 4px"><i style="width:${Math.round(doneN*100/run.list.length)}%"></i></div>`;
  run.list.forEach((q,i)=>{ h += drQHtml(q, i); });
  if (doneN >= run.list.length){
    h += `<div class="score-line">本组 ${okN} / ${run.list.length} 题过关</div>`;
    if (run.mode!=="redo"){
      if (run.base + run.list.length < run.poolLen)
        h += `<button class="btn-main" onclick="drStart('seq')">下一组 10 题</button>`;
      else
        h += `<p class="sub" style="margin:8px 0 0">这一遍刷完了!换个题型继续,或清零再来。</p>`;
    }
    if (run.wrongThis.length)
      h += `<button class="btn-ghost" onclick="drStart('redo')">趁热回炉本组错题(${run.wrongThis.length} 题)</button>`;
    h += `<button class="btn-ghost" onclick="drExit()">返回</button>`;
  } else {
    h += `<button class="btn-ghost" onclick="drExit()">退出 · 已答的都已记录</button>`;
  }
  document.getElementById("drBody").innerHTML = h;
}
function drReveal(i){ MEM._drun.qs[i].reveal = true; drRender(); }
function drPick(i, k){
  const run = MEM._drun, q = run.list[i], s = run.qs[i];
  if (s.mine!==null) return;
  if (q.type==="多选"){ s.sel.has(k) ? s.sel.delete(k) : s.sel.add(k); drRender(); }
  else { s.sel = new Set([k]); drJudge(i); }
}
function drJudge(i){
  const run = MEM._drun, q = run.list[i];
  const mine = Array.from(run.qs[i].sel).sort().join("");
  if (!mine) return;
  drRecord(i, mine, mine===q.ans);
}
function drMark(i, ok){ drRecord(i, ok?"会":"不熟", ok); }
function drRecord(i, mine, ok){
  const run = MEM._drun, st = drSt(), q = run.list[i], s = run.qs[i];
  s.mine = mine; s.ok = ok;
  if (!ok) run.wrongThis.push(q.id);
  if (ok){ st.right[q.id] = 1; delete st.wrong[q.id]; }
  else st.wrong[q.id] = 1;
  if (run.mode!=="redo" && run.qs.every(x=>x.mine!==null))
    st.pos[drKeyOf()] = run.base + run.list.length;   // 整组答完才推进断点
  drSave();
  drRender();
  renderDrill();   // 只刷新角标,答题界面不动
}
function drExit(){ MEM._drun = null; renderDrill(true); }
function drReset(){
  if (!confirm("确定清空全部刷题记录?进度、错题都会归零。")) return;
  const f = drSt().f;
  MEM._drill = {right:{}, wrong:{}, pos:{}, f};
  drSave(); renderDrill(true);
}

// ---- 逐日安排 ----
function renderSched(){
  const el = document.getElementById("schedList");
  let h = "";
  for (let w=1; w<=15; w++){
    const dl = SCHED.filter(r=>r.week===w);
    if (!dl.length) continue;
    const open = inRange && curWeek===w ? " open" : "";
    const rng = dl[0].key.replace("-","/") + "–" + dl[dl.length-1].key.replace("-","/");
    h += `<details class="wk"${open}><summary><span class="wno">第${w}周</span><span class="rng">${rng} · ${themeName(w)}</span></summary>`;
    dl.forEach(r=>{
      const isToday = inRange && r.n===dayNo;
      const dr = store.get("r:"+r.key);
      h += `<div class="drow${r.rest?" rest":""}${isToday?" today-row":""}">`;
      h += `<span class="dn">第${r.n}天</span><span class="dd">${r.key.replace("-","/")} ${WD[r.d.getDay()]}</span><span>${r.act}</span>`;
      if (dr){
        h += `<span class="done">✓ 5题${dr.c*20}分</span>`;
      }
      h += `</div>`;
    });
    h += `</details>`;
  }
  el.innerHTML = h;
}

function refreshAll(){ renderToday(); renderDraw(); renderDaily(); renderExam(); renderWrongs(); renderDrill(); renderSched(); }
refreshAll(); renderShort();
</script>
